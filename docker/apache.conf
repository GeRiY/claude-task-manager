# A board Apache vhostja — a Dockerfile ezt másolja a 000-default.conf helyére.
#
# A ${CTM_PORT} nem docker-compose-, hanem APACHE-szintű behelyettesítés: az Apache a saját
# környezeti változóiból oldja fel a config parse-olásakor. Az értéket a docker-compose.yml
# adja át (environment: CTM_PORT), a Dockerfile ENV-je csak a fallback default.
<VirtualHost *:${CTM_PORT}>
    # A docroot a repo gyökere (nem a /var/www/html): innen jön az index.html, a js/*, a
    # style.css, a board által OLVASOTT data/<projekt>/tasks.json, és innen futtatja a
    # mod_php az api/index.php write-endpointot.
    DocumentRoot /app
    DirectoryIndex index.html index.php

    # Enélkül az Apache 403-at adna: az apache2.conf csak a /var/www/-ra enged, a /app-ra nem.
    <Directory /app>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # A docroot a repo gyökere, így a rejtett fájlok (.env a CTM_PORT/CTM_UID-dal, .git/)
    # is a webgyökérben ülnek — ezeket sosem adjuk ki HTTP-n.
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    # A konténer logja a docker logs-ba folyjon (a /dev/std* helyett /proc/self/fd/*, mert
    # az Apache nem-root userként is tudja nyitni).
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
