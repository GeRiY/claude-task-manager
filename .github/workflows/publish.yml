name: Publish to npm

# Triggers on a pushed version tag (v1.0.1, v1.1.0, ...), created by `npm version`.
# Requires an npm automation token stored as the NPM_TOKEN repo secret
# (npmjs.com -> Access Tokens -> Generate New Token -> Granular Access Token,
# permission "Read and write", with "Bypass 2FA" enabled for CI publishing).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
