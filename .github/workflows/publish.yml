name: Publish to npm

# Triggers on a pushed version tag (v1.0.1, v1.1.0, ...), created by `npm version`.
#
# Auth: NPM_TOKEN repo secret (npmjs.com -> Access Tokens -> Granular Access Token,
# "Read and write", bypass-2FA enabled for CI publishing).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) and provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
