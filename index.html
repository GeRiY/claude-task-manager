<!DOCTYPE html>
<html lang="hu" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Task Manager – Kanban board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Tailwind Play CDN – csak a statikus markup utility-osztályait dolgozza fel.
  // A tényleges komponens-stílusok (kártya, oszlop, modal, badge-ek, stb.) a
  // külön style.css-ben, sima CSS-ként élnek (a lenti tokenek CSS custom
  // property-ként ott vannak definiálva) – lásd style.css tetején lévő megjegyzést.
  tailwind.config = {
    darkMode: "class",
    // A Preflight (base reset) `button,input,select{padding:0}`-t adna, amit a CDN
    // futásidőben a style.css UTÁN injektál → felülírná a saját gomb/mező paddingjainkat.
    // Kikapcsolva; a base stílusokat a style.css adja, a utility-osztályok maradnak.
    corePlugins: { preflight: false },
    theme: {
      extend: {
        colors: {
          bg: "var(--bg)",
          panel: "var(--panel)",
          "panel-2": "var(--panel-2)",
          "panel-3": "var(--panel-3)",
          ink: "var(--text)",
          muted: "var(--muted)",
          edge: "var(--border)",
          accent: "var(--accent)",
          "accent-solid": "var(--accent-solid)",
          todo: "var(--todo)",
          inprogress: "var(--in_progress)",
          blocked: "var(--blocked)",
          review: "var(--review)",
          done: "var(--done)",
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">
<header class="shadow-sm dark:shadow-black/40 transition-shadow">
  <div class="hd-left">
    <h1 class="tracking-tight"><span class="logo" aria-hidden="true"><i></i><i></i><i></i></span> Task Manager</h1>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">indul…</span><span class="clock" id="clock"></span></div>
  </div>
  <div class="hd-center">
    <label class="search-box"><svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg> <input id="q" type="search" placeholder="keresés…" spellcheck="false"></label>
    <div class="src-box">
      <button type="button" class="src-btn" id="srcBtn" aria-haspopup="true" aria-expanded="false">
        <span class="lbl">Forrás</span><span class="src-dot"></span><span class="src-path" id="srcPathLabel">nincs projekt</span><span class="chev"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg></span>
      </button>
      <div class="src-panel" id="srcPanel">
        <label class="src-panel-lbl">Projekt
          <select id="srcProject"></select>
        </label>
        <div class="src-panel-path" id="srcPanelPath"></div>
        <input id="src" type="hidden">
      </div>
    </div>
  </div>
  <div class="hd-right">
    <label class="ctl">Poll
      <select id="interval">
        <option value="1000">1 mp</option><option value="2000" selected>2 mp</option>
        <option value="5000">5 mp</option><option value="10000">10 mp</option>
      </select>
    </label>
    <label class="ctl" title="Ki nevében írjon a board (task.sh --as). Kiválasztható agent/reviewer, nem fix human."><svg class="ico ico-accent" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.4"></circle><path d="M5.5 20a6.5 6.5 0 0 1 13 0"></path></svg> Mint <input id="actor" type="text" list="actorList" placeholder="pl. reviewer" spellcheck="false" autocomplete="off"><datalist id="actorList"></datalist></label>
    <button id="notifyBtn" title="Böngésző-értesítés státuszváltáskor (→ review / done)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg></button>
    <button id="projectsBtn" title="Regisztrált projektek + wrapper task.sh másolása"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"></rect><path d="M3 9h18"></path></svg> Projektek</button>
    <button id="ctxBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3.5h6l-1 6 3 3v2h-4.2v5.2l-.8 1.8-.8-1.8V14.5H7v-2l3-3-1-6Z"></path></svg> Kontextus</button>
    <button id="toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect></svg> <span class="btxt">Szünet</span></button>
    <button id="refresh"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 11a8 8 0 1 0-.7 3.2"></path><path d="M20 4.5V11h-6.5"></path></svg></button>
  </div>
</header>

<div class="stats" id="stats"></div>
<div class="controls" id="controls">
  <span class="lbl">Rendezés</span>
  <select id="sort">
    <option value="activity">utolsó aktivitás</option>
    <option value="created">létrehozás</option>
    <option value="title">cím (A→Z)</option>
    <option value="team">Team #</option>
  </select>
  <span class="lbl">Nézet</span>
  <div class="segmented">
    <button id="viewBoard" class="on">Kanban</button>
    <button id="viewSwim">Swimlane</button>
    <button id="viewFeed">Folyam</button>
    <button id="compact">Kompakt</button>
  </div>
  <span class="sep"></span>
  <span class="lbl">Gyorsszűrő</span>
  <button id="qfReview" class="qf"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4h10M7 20h10M8 4v3l4 5 4-5V4M8 20v-3l4-5 4 5v3"></path></svg> Rád vár</button>
  <button id="qfActive" class="qf">Aktív</button>
  <button id="qfBlocked" class="qf">Blocked</button>
  <span class="ro"><svg class="ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg> read-only nézet – a fájlt az agent írja</span>
</div>
<div class="agents-wrap" id="agentsWrap">
  <button type="button" class="agents-head" id="agentsHead" aria-expanded="true">
    <span class="lbl">Ágens-terhelés &amp; szűrő</span>
    <span class="count-pill" id="agentsCount">0 aktív</span>
    <svg class="chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
  </button>
  <div class="agents" id="agents"></div>
</div>
<div class="banner" id="banner"></div>
<div class="board" id="board"></div>

<div class="overlay backdrop-blur" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <header><h2 id="mTitle">–</h2><button class="close" id="mClose">✕ Bezár</button></header>
    <div class="body" id="mBody"></div>
  </div>
</div>

<div class="overlay backdrop-blur" id="ctxOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <header><h2>📌 User context <span class="mut" id="ctxUpdated"></span></h2><button class="close" id="ctxClose">✕ Bezár</button></header>
    <div class="body" id="ctxBody"></div>
  </div>
</div>

<div class="overlay backdrop-blur" id="projectsOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <header><h2>📁 Projektek</h2><button class="close" id="projectsClose">✕ Bezár</button></header>
    <div class="body" id="projectsBody"></div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
